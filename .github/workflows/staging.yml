name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -e .

      - name: Build package
        run: |
          . .venv/bin/activate
          pip install build
          python -m build

      - name: Deploy to staging environment
        run: |
          echo "::notice title=Staging Deploy::CI passed — deploying to staging"
          echo "Version: $(grep '^version' pyproject.toml | head -n1 | sed -E 's/.*\"([0-9]+\.[0-9]+\.[0-9]+)\".*/\1/')"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
