name: Deploy to Staging

on:
  push:
    branches: ["main"]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit coverage build

      - name: Install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .

      - name: Run full quality gate
        run: |
          . .venv/bin/activate
          ruff check src/ tests/
          ruff format --check src/ tests/
          mypy src/
          bandit -r src/ --quiet
          coverage run -m unittest discover tests
          coverage report -m --fail-under=80

      - name: Build package
        run: |
          . .venv/bin/activate
          python -m build

      - name: Deploy to staging environment
        run: |
          echo "::notice title=Staging Deploy::Package built successfully from main branch"
          echo "Version: $(grep '^version' pyproject.toml | head -n1 | sed -E 's/.*\"([0-9]+\.[0-9]+\.[0-9]+)\".*/\1/')"
          echo "Commit: ${{ github.sha }}"
